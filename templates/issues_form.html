<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Behaviour / Issues Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container py-4">
    <h3 class="mb-3">Critical Student Behaviour & Issues Form</h3>

    <div class="mb-3">
        <strong>Reg No:</strong> {{ student.reg_no }}<br>
        <strong>Name:</strong> {{ student.name }}<br>
        <strong>Dept:</strong> {{ student.dept }}<br>
        <strong>Semester:</strong> {{ student.semester }}<br>
        <strong>Risk Level:</strong> {{ student.risk_level }}
    </div>

    <form method="POST" class="card bg-secondary p-3">

        <div class="mb-3">
            <label class="form-label">1. In your opinion, what are the main reasons for your academic backlogs?</label>
            <textarea name="q_academic_reason" class="form-control" rows="3">{{ saved.q_academic_reason if saved }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">2. Are there any personal issues affecting your studies? (time, motivation, environment, etc.)</label>
            <textarea name="q_personal_reason" class="form-control" rows="3">{{ saved.q_personal_reason if saved }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">3. Are you facing any family-related issues that impact your academics?</label>
            <textarea name="q_family_issue" class="form-control" rows="2">{{ saved.q_family_issue if saved }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">4. Are you facing any financial issues that affect your studies?</label>
            <textarea name="q_finance_issue" class="form-control" rows="2">{{ saved.q_finance_issue if saved }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">5. Are there any health-related issues (physical/mental) affecting your performance?</label>
            <textarea name="q_health_issue" class="form-control" rows="2">{{ saved.q_health_issue if saved }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">6. What kind of support from college/teachers/mentors do you feel will help you?</label>
            <textarea name="q_support_needed" class="form-control" rows="3">{{ saved.q_support_needed if saved }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save Response</button>
        <a href="{{ url_for('sample') }}" class="btn btn-outline-light ms-2">Back to Results</a>
    </form>
</div>
</body>
</html>
